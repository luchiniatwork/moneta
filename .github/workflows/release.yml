# ---------------------------------------------------------------------------
# Release workflow — triggered by semver tags (v*.*.*)
#
# Jobs:
#   1. ci          — typecheck, lint, test
#   2. publish-npm — build & publish @luchiniatwork22/moneta-cli and
#                    @luchiniatwork22/moneta-mcp-server to npm
#   3. publish-docker — build & push luchiniatwork/moneta-api to Docker Hub
# ---------------------------------------------------------------------------

name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  # -------------------------------------------------------------------------
  # Quality gate
  # -------------------------------------------------------------------------
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - run: bun run typecheck
      - run: bun run lint
      - run: bun test

  # -------------------------------------------------------------------------
  # Publish npm packages
  # -------------------------------------------------------------------------
  publish-npm:
    name: Publish to npm
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Build packages
        run: bun run build

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set package versions
        run: |
          cd packages/cli && npm version "${{ steps.version.outputs.VERSION }}" --no-git-tag-version
          cd ../mcp-server && npm version "${{ steps.version.outputs.VERSION }}" --no-git-tag-version

      - name: Configure npm authentication
        run: echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc

      - name: Publish @luchiniatwork22/moneta-cli
        run: npm publish --access public
        working-directory: packages/cli

      - name: Publish @luchiniatwork22/moneta-mcp-server
        run: npm publish --access public
        working-directory: packages/mcp-server

  # -------------------------------------------------------------------------
  # Publish Docker image
  # -------------------------------------------------------------------------
  publish-docker:
    name: Publish to Docker Hub
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            luchiniatwork/moneta-api:${{ steps.version.outputs.VERSION }}
            luchiniatwork/moneta-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
